<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Gói Tập</title>
    <th:block th:replace="base :: bootstrap"></th:block>
</head>
<body>
<div th:replace="base :: header"></div>

<main class="container">
    <h1 class="text-center mt-3">Danh sách Gói Tập</h1>

    <form th:action="@{/training-packages}" method="get" class="row g-3 mb-4">
        <div class="col-md-4">
            <input type="text" class="form-control" name="kw" placeholder="Từ khóa tên gói" />
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" class="form-control" name="fromPrice" placeholder="Giá từ" />
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" class="form-control" name="toPrice" placeholder="Giá đến" />
        </div>
        <div class="col-md-2">
            <select class="form-select" name="active">
                <option value="">-- Kích hoạt --</option>
                <option value="true">Đang bán</option>
                <option value="false">Ngưng bán</option>
            </select>
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-info">Lọc</button>
        </div>
    </form>

    <a th:href="@{/training-packages-add-view}" class="btn btn-success mb-3">Thêm gói tập</a>

    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Tên gói</th>
                    <th>Giá (VNĐ)</th>
                    <th>Thời hạn (ngày)</th>
                    <th>Mô tả</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${trainingPackages}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td th:text="${p.duration}"></td>
                    <td th:text="${p.description}"></td>
                    <td>
                        <span th:text="${p.active ? 'Đang bán' : 'Ngưng bán'}"
                              th:classappend="${p.active} ? 'text-success' : 'text-danger'">
                        </span>
                    </td>
                    <td>
                        <a th:href="@{'/training-packages/edit/' + ${p.id}}" class="btn btn-warning btn-sm">Sửa</a>
                        <button class="btn btn-danger btn-sm"
                                th:onclick="'deleteTrainingPackage(\'' + @{/api/training-packages/} + '\',' + ${p.id} + ')';">
                            &times;
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="base :: footer"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
