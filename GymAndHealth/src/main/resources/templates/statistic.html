<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thống kê doanh thu</title>
    <th:block th:replace="base :: bootstrap"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="base :: header"></div>

<main class="container mt-4">
    <h2 class="text-center mb-4">Thống kê Doanh thu</h2>

    <!-- Form lọc thống kê -->
    <form class="row g-2 mb-4" method="get" th:action="@{/statistics}">
        <div class="col-md-3">
            <select class="form-select" name="time" required>
                <option value="DAY" th:selected="${time == 'DAY'}">Theo ngày</option>
                <option value="MONTH" th:selected="${time == 'MONTH'}">Theo tháng</option>
                <option value="QUARTER" th:selected="${time == 'QUARTER'}">Theo quý</option>
            </select>
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control" name="year" th:value="${year}" placeholder="Năm" required />
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Lọc</button>
        </div>
    </form>

    <!-- Biểu đồ doanh thu -->
    <div class="card mb-4 p-3">
        <canvas id="revenueChart" height="100"></canvas>
    </div>

    <!-- Bảng doanh thu theo gói tập -->
    <div class="card p-3">
        <h5>Doanh thu theo Gói tập</h5>
        <table class="table table-bordered mt-3">
            <thead class="table-light text-center">
                <tr>
                    <th>ID</th>
                    <th>Tên gói</th>
                    <th>Tổng doanh thu (VNĐ)</th>
                </tr>
            </thead>
            <tbody class="text-center">
                <tr th:each="r : ${revenueByPackage}">
                    <td th:text="${r[0]}"></td>
                    <td th:text="${r[1]}"></td>
                    <td th:text="${#numbers.formatDecimal(r[2], 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="base :: footer"></div>

<script th:inline="javascript">
    const labels = /*[[${revenueByTimeLabels}]]*/ [];
    const data = /*[[${revenueByTimeData}]]*/ [];

    const ctx = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Doanh thu',
                data: data,
                backgroundColor: '#0d6efd'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: 'Doanh thu theo thời gian'
                }
            }
        }
    });
</script>
</body>
</html>
