<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Danh sách người dùng</title>
    <th:block th:replace="base :: bootstrap"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <main class="container mt-4">
        <h2 class="text-center mb-4">Danh sách người dùng hệ thống</h2>

        <!-- Form tìm kiếm -->
        <form th:action="@{/users}" method="get">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <input type="text" class="form-control" name="username" placeholder="Tìm theo tên đăng nhập..." />
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <button class="btn btn-info w-100" type="submit">Tìm kiếm</button>
                </div>
                <div class="col-md-3 mb-3">
                    <a th:href="@{/user-add-view}" class="btn btn-success w-100">Thêm người dùng</a>
                </div>
            </div>
        </form>

        <!-- Danh sách user -->
        <div class="table-responsive">
            <table class="table table-striped table-hover text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Avatar</th>
                        <th>Họ tên</th>
                        <th>Tên đăng nhập</th>
                        <th>Email</th>
                        <th>SĐT</th>
                        <th>Giới tính</th>
                        <th>Vai trò</th>
                        <th>Ngày sinh</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}"></td>
                        <td>
                            <img th:src="${u.avatar}" alt="avatar" width="50" class="rounded-circle" />
                        </td>
                        <td th:text="${u.lastName + ' ' + u.firstName}"></td>
                        <td th:text="${u.username}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.phone}"></td>
                        <td th:text="${u.gender}"></td>     
                        <td th:text="${u.userRole}"></td>
                        <td th:text="${#dates.format(u.dateOfBirth, 'dd-MM-yyyy')}"></td>
                        <td>
                            <a th:href="@{'/users/' + ${u.id}}" class="btn btn-sm btn-warning mb-1">Sửa</a>
                            <button type="button" class="btn btn-sm btn-danger" 
                                    th:onclick="'deleteUser(\'/users/\',' + ${u.id} + ')'">Xóa</button>

                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="base :: footer"></div>

    <script th:src="@{/js/main.js}"></script>
    <script>
        function deleteUser(userId) {
            if (confirm("Bạn có chắc muốn xóa người dùng này?")) {
                fetch('/api/users/' + userId, {
                    method: 'DELETE'
                })
                        .then(response => {
                            if (response.ok) {
                                location.reload();
                            } else {
                                alert('Xóa thất bại!');
                            }
                        });
            }
        }
    </script>
</body>
</html>
