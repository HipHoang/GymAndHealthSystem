<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gửi phản hồi</title>
    <th:block th:replace="base :: bootstrap"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <main class="container">
        <div class="card p-4 shadow-sm">
            <h2 class="text-center mb-4">Gửi phản hồi cho Huấn luyện viên</h2>

            <div th:if="${error}" class="alert alert-danger text-center">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/feedback/add}" th:object="${feedback}" method="post">
                <input type="hidden" th:field="*{id}" />

                <!-- Member -->
                <div class="mb-3">
                    <label for="memberId" class="form-label">Người gửi</label>
                    <select th:field="*{memberId.id}" class="form-select" required>
                        <option th:each="u : ${users}"
                                th:value="${u.id}"
                                th:text="${u.fullName + ' (' + u.username + ')'}">
                        </option>
                    </select>
                </div>

                <!-- Target -->
                <div class="mb-3">
                    <label for="targetId" class="form-label">Người nhận phản hồi (PT)</label>
                    <select th:field="*{targetId.id}" class="form-select" required>
                        <option th:each="u : ${trainers}"
                                th:value="${u.id}"
                                th:text="${u.fullName + ' (' + u.username + ')'}">
                        </option>
                    </select>
                </div>

                <!-- Rating -->
                <div class="mb-3">
                    <label class="form-label">Đánh giá (1 đến 5)</label>
                    <input type="number" th:field="*{rating}" class="form-control" min="1" max="5" required />
                </div>

                <!-- Comment -->
                <div class="mb-3">
                    <label class="form-label">Nội dung phản hồi</label>
                    <textarea th:field="*{comment}" class="form-control" rows="4" required></textarea>
                </div>

                <!-- Submit -->
                <div>
                    <button class="btn btn-success w-100 mt-2" type="submit">
                        <span th:if="${feedback.id == null}">Gửi phản hồi</span>
                        <span th:unless="${feedback.id == null}">Cập nhật phản hồi</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="base :: footer"></div>
</body>
</html>
