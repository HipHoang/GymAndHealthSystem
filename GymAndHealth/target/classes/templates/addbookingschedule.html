<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt lịch tập</title>
    <th:block th:replace="base :: bootstrap"></th:block>
</head>
<body>
<div th:replace="base :: header"></div>

<main class="container">
    <div class="card p-4 shadow-sm">
        <h1 class="text-center mb-4">Đặt lịch tập luyện</h1>

        <div th:if="${error}" class="alert alert-danger text-center">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/booking-schedule/add}" th:object="${bookingSchedule}" method="post">
            <input type="hidden" th:field="*{id}" />

            <!-- Chọn hội viên -->
            <div class="mb-3">
                <label for="memberId" class="form-label">Hội viên</label>
                <select th:field="*{memberId.id}" class="form-select" required>
                    <option value="">-- Chọn hội viên --</option>
                    <option th:each="m : ${members}" 
                            th:value="${m.id}" 
                            th:text="${m.fullName + ' (' + m.username + ')'}">
                    </option>
                </select>
            </div>

            <!-- Chọn huấn luyện viên -->
            <div class="mb-3">
                <label for="ptId" class="form-label">Huấn luyện viên</label>
                <select th:field="*{ptId.id}" class="form-select" required>
                    <option value="">-- Chọn huấn luyện viên --</option>
                    <option th:each="p : ${trainers}" 
                            th:value="${p.id}" 
                            th:text="${p.fullName + ' (' + p.username + ')'}">
                    </option>
                </select>
            </div>

            <!-- Thời gian -->
            <div class="mb-3">
                <label class="form-label">Thời gian tập</label>
                <input type="datetime-local" th:field="*{scheduleTime}" class="form-control" required />
            </div>

            <!-- Loại buổi tập -->
            <div class="mb-3">
                <label class="form-label">Loại buổi tập</label>
                <select th:field="*{type}" class="form-select" required>
                    <option value="TẬP CÁ NHÂN">Tập cá nhân</option>
                    <option value="TẬP NHÓM">Tập nhóm</option>
                </select>
            </div>

            <!-- Trạng thái -->
            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" class="form-select">
                    <option value="CHỜ XÁC NHẬN">Chờ xác nhận</option>
                    <option value="ĐÃ XÁC NHẬN">Đã xác nhận</option>
                    <option value="ĐÃ HỦY">Đã hủy</option>
                </select>
            </div>

            <!-- Ghi chú -->
            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea th:field="*{note}" class="form-control" rows="3"></textarea>
            </div>

            <div>
                <button type="submit" class="btn btn-primary w-100">
                    <span th:if="${bookingSchedule.id == null}">Tạo lịch</span>
                    <span th:unless="${bookingSchedule.id == null}">Cập nhật lịch</span>
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="base :: footer"></div>
</body>
</html>
