<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tiến độ tập luyện</title>
    <th:block th:replace="base :: bootstrap"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <main class="container">
        <h1 class="text-center mt-3 mb-4">Danh sách Tiến độ Tập luyện</h1>

        <form th:action="@{/training-progress}" method="get">
            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="memberId" placeholder="ID hội viên">
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="ptId" placeholder="ID huấn luyện viên">
                </div>
                <div class="col-md-4">
                    <input type="date" class="form-control" name="date" placeholder="Ngày tập">
                </div>
            </div>
            <div class="mb-3">
                <button class="btn btn-info" type="submit">Lọc</button>
                <a th:href="@{/training-progress/add-view}" class="btn btn-success ms-2">Thêm tiến độ mới</a>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-light text-center">
                    <tr>
                        <th>ID</th>
                        <th>Hội viên</th>
                        <th>Huấn luyện viên</th>
                        <th>Ngày</th>
                        <th>Tiến độ</th>
                    </tr>
                </thead>
                <tbody class="text-center">
                    <tr th:each="p : ${progressList}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.memberId.fullName + ' (' + p.memberId.username + ')'}"></td>
                        <td th:text="${p.ptId.fullName + ' (' + p.ptId.username + ')'}"></td>
                        <td th:text="${#dates.format(p.date, 'dd-MM-yyyy')}"></td>
                        <td th:text="${p.progressDetail}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="base :: footer"></div>
</body>
</html>
