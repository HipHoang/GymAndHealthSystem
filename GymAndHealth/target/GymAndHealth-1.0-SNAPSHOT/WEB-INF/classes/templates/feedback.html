<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Phản hồi</title>
    <th:block th:replace="base :: bootstrap"></th:block>
</head>
<body>
<div th:replace="base :: header"></div>

<main class="container mt-4">
    <h2 class="text-center mb-3">Danh sách phản hồi người dùng</h2>

    <!-- Form lọc -->
    <form th:action="@{/feedback}" method="get" class="row g-3 mb-4">
        <div class="col-md-4">
            <input type="text" name="memberId" class="form-control" placeholder="ID người gửi (member)" />
        </div>
        <div class="col-md-4">
            <input type="text" name="targetId" class="form-control" placeholder="ID người nhận (target)" />
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-info w-100">Lọc kết quả</button>
        </div>
    </form>

    <!-- Bảng danh sách phản hồi -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Người gửi</th>
                    <th>Người nhận</th>
                    <th>Rating</th>
                    <th>Nội dung</th>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="f : ${feedbacks}">
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.memberId.fullName + ' (' + f.memberId.username + ')'}"></td>
                    <td th:text="${f.targetId.fullName + ' (' + f.targetId.username + ')'}"></td>
                    <td th:text="${f.rating}"></td>
                    <td th:text="${f.content}"></td>
                    <td th:text="${#dates.format(f.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
                    <td>
                        <button class="btn btn-danger btn-sm"
                                th:onclick="'deleteFeedback(\''+@{/api/feedback/}+'\','+${f.id}+')'">
                            &times;
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="base :: footer"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
